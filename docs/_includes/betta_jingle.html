<script>
  (function () {
    let ctx;

    function createCtx() {
      if (!ctx || ctx.state === "closed")
        ctx = new (window.AudioContext || window.webkitAudioContext)();
      return ctx;
    }

    function playJingle() {
      const audio = createCtx();
      const t0 = audio.currentTime + 0.05;

      /* ── Bus ─────────────────────────────────────────────────────── */
      const master = audio.createGain();
      master.gain.value = 0.13;
      const comp = audio.createDynamicsCompressor();
      comp.threshold.value = -28; comp.knee.value = 18;
      comp.ratio.value = 2.0; comp.attack.value = 0.01; comp.release.value = 0.22;
      master.connect(comp);
      comp.connect(audio.destination);

      /* ── Reverb (helles, weites IR – wie Wasseroberfläche) ────────── */
      const reverb = audio.createConvolver();
      reverb.buffer = makeWaterIR(audio, 1.8);
      const revWet = audio.createGain(); revWet.gain.value = 0.28;
      reverb.connect(revWet); revWet.connect(master);

      /* ── Stereo-Delay (Echo der Tropfen) ─────────────────────────── */
      const dly = audio.createDelay(1); dly.delayTime.value = 0.21;
      const dlyFb = audio.createGain(); dlyFb.gain.value = 0.18;
      const dlyGain = audio.createGain(); dlyGain.gain.value = 0.14;
      const dlyPanL = audio.createStereoPanner(); dlyPanL.pan.value = -0.35;
      const dlyPanR = audio.createStereoPanner(); dlyPanR.pan.value = 0.35;
      dly.connect(dlyFb); dlyFb.connect(dly);
      dly.connect(dlyPanL); dlyPanL.connect(master);
      dly.connect(dlyPanR); dlyPanR.connect(master);

      /* ── Helles IR: klares, luftiges Wasser-Reverb ────────────────── */
      function makeWaterIR(audio, dur) {
        const sr = audio.sampleRate, len = Math.floor(sr * dur);
        const buf = audio.createBuffer(2, len, sr);
        for (let ch = 0; ch < 2; ch++) {
          const d = buf.getChannelData(ch);
          for (let i = 0; i < len; i++) {
            const t = i / sr;
            const env = Math.pow(1 - t / dur, 1.6);
            d[i] = (Math.random() * 2 - 1) * env * 0.38;
          }
          // frühe Reflexionen (Tropfen-Echo)
          [0.008, 0.018, 0.031, 0.055].forEach((s, k) => {
            const idx = Math.min(len - 1, Math.floor(sr * s));
            d[idx] += 0.22 / (k + 1);
          });
        }
        return buf;
      }

      /* ── Hilfsfunktionen ─────────────────────────────────────────── */
      function note(semi) { return 440 * Math.pow(2, semi / 12); }

      /* ── WASSERTROPFEN: natürlicher, tiefer Sinusglide ── */
      function drop(when, { f0 = 520, f1 = 180, dur = 0.35, gain = 0.42,
                            pan = 0.0, shimmer = true } = {}) {
        const osc = audio.createOscillator();
        osc.type = "sine";
        // sanfterer, längerer Glide – realer Wassertropfen fällt langsamer
        osc.frequency.setValueAtTime(f0, when);
        osc.frequency.exponentialRampToValueAtTime(f1, when + dur * 0.7);
        osc.frequency.exponentialRampToValueAtTime(f1 * 0.85, when + dur);

        const g = audio.createGain();
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(gain, when + 0.007);
        g.gain.exponentialRampToValueAtTime(0.0001, when + dur + 0.08);

        const hp = audio.createBiquadFilter();
        hp.type = "highpass"; hp.frequency.value = 80;
        // Tiefpassfilter macht es weicher, weniger elektronisch
        const lp = audio.createBiquadFilter();
        lp.type = "lowpass"; lp.frequency.value = 1800;

        const pan_ = audio.createStereoPanner(); pan_.pan.value = pan;
        const toRev = audio.createGain(); toRev.gain.value = 0.55;
        const toDly = audio.createGain(); toDly.gain.value = 0.18;

        osc.connect(hp); hp.connect(lp); lp.connect(g);
        g.connect(pan_); pan_.connect(master);
        g.connect(toRev); toRev.connect(reverb);
        g.connect(toDly); toDly.connect(dly);
        osc.start(when); osc.stop(when + dur + 0.2);

        // Shimmer: sehr dezent, nur eine Oktave höher (kein hartes Klirren)
        if (shimmer) {
          const sh = audio.createOscillator();
          sh.type = "sine"; // sine statt triangle – viel weicher
          sh.frequency.value = f0 * 1.5; // Quinte statt 2.3-faches
          const shg = audio.createGain();
          shg.gain.setValueAtTime(0, when);
          shg.gain.linearRampToValueAtTime(gain * 0.08, when + 0.005);
          shg.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.3);
          const shRev = audio.createGain(); shRev.gain.value = 0.6;
          sh.connect(shg); shg.connect(shRev); shRev.connect(reverb); // nur Reverb, nicht direct
          sh.start(when); sh.stop(when + dur * 0.4);
        }
      }

      /* ── FISCH-FLITZEN: weicher, organischer Sweep ─────────────── */
      function fishDart(when, { fromPan = -0.6, toPan = 0.6, dur = 0.28,
                                f0 = 180, f1 = 620 } = {}) {
        const osc = audio.createOscillator();
        osc.type = "sine"; // sine statt sawtooth – viel natürlicher
        osc.frequency.setValueAtTime(f0, when);
        osc.frequency.exponentialRampToValueAtTime(f1, when + dur * 0.5);
        osc.frequency.exponentialRampToValueAtTime(f0 * 0.7, when + dur);

        const g = audio.createGain();
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(0.18, when + 0.012); // leiser
        g.gain.exponentialRampToValueAtTime(0.0001, when + dur);

        const bp = audio.createBiquadFilter();
        bp.type = "bandpass"; bp.frequency.value = 380; bp.Q.value = 1.2;

        const pan_ = audio.createStereoPanner();
        pan_.pan.setValueAtTime(fromPan, when);
        pan_.pan.linearRampToValueAtTime(toPan, when + dur);

        const toRev = audio.createGain(); toRev.gain.value = 0.45;

        osc.connect(bp); bp.connect(g);
        g.connect(pan_); pan_.connect(master);
        g.connect(toRev); toRev.connect(reverb);
        osc.start(when); osc.stop(when + dur + 0.1);

        // Nur sehr leises Wasserrauschen – kein hartes Noise-Burst
        const bufSize = Math.floor(audio.sampleRate * 0.08);
        const nBuf = audio.createBuffer(1, bufSize, audio.sampleRate);
        const nd = nBuf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) nd[i] = (Math.random() * 2 - 1);
        const noise = audio.createBufferSource(); noise.buffer = nBuf;
        const nlp = audio.createBiquadFilter();
        nlp.type = "lowpass"; nlp.frequency.value = 800; // tiefer = weicher
        const ng = audio.createGain();
        ng.gain.setValueAtTime(0, when);
        ng.gain.linearRampToValueAtTime(0.04, when + 0.01);
        ng.gain.exponentialRampToValueAtTime(0.0001, when + 0.08);
        const nRev = audio.createGain(); nRev.gain.value = 0.5;
        noise.connect(nlp); nlp.connect(ng);
        ng.connect(pan_); ng.connect(nRev); nRev.connect(reverb);
        noise.start(when); noise.stop(when + 0.1);
      }

      /* ── OASEN-PAD: wärmer, auf A-Dur gestimmt ───────────────────── */
      function oasisPad(when, { dur = 2.4 } = {}) {
        // A-Dur Pentatonik: A2, E3, A3, C#4 – wärmer und einladender als E
        const freqs = [note(-21), note(-14), note(-9), note(-5)];
        freqs.forEach((f, i) => {
          const osc = audio.createOscillator();
          osc.type = "sine";
          osc.frequency.value = f;
          osc.detune.value = [-4, 3, -2, 5][i] + Math.random() * 1.5;

          const g = audio.createGain();
          g.gain.setValueAtTime(0, when);
          g.gain.linearRampToValueAtTime(0.055 - i * 0.008, when + dur * 0.4);
          g.gain.linearRampToValueAtTime(0, when + dur);

          const lp = audio.createBiquadFilter();
          lp.type = "lowpass"; lp.frequency.value = 700 - i * 60;

          const pan_ = audio.createStereoPanner();
          pan_.pan.value = [-0.18, 0.18, -0.08, 0.08][i];

          const toRev = audio.createGain(); toRev.gain.value = 0.75;

          osc.connect(lp); lp.connect(g);
          g.connect(pan_); pan_.connect(master);
          g.connect(toRev); toRev.connect(reverb);
          osc.start(when); osc.stop(when + dur + 0.4);
        });
      }

      /* ── MELODIE-KRISTALL: weicher, auf A-Dur ────────────────────── */
      function crystal(f, when, { dur = 0.6, gain = 0.42, pan = 0.0 } = {}) {
        const osc = audio.createOscillator();
        osc.type = "sine";
        osc.frequency.value = f;
        // zweiter Ton eine reine Oktave (nicht 2.01 – das klang zu nach Elektronik)
        const osc2 = audio.createOscillator();
        osc2.type = "sine";
        osc2.frequency.value = f * 2.0;
        osc2.detune.value = -2;

        const g = audio.createGain();
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(gain, when + 0.009);
        g.gain.exponentialRampToValueAtTime(0.0001, when + dur);

        const g2 = audio.createGain(); g2.gain.value = 0.09; // Oktave dezenter
        const lp = audio.createBiquadFilter();
        lp.type = "lowpass"; lp.frequency.value = 2200;
        const pan_ = audio.createStereoPanner(); pan_.pan.value = pan;
        const toRev = audio.createGain(); toRev.gain.value = 0.55;
        const toDly = audio.createGain(); toDly.gain.value = 0.14;

        osc.connect(lp); osc2.connect(g2); g2.connect(lp);
        lp.connect(g);
        g.connect(pan_); pan_.connect(master);
        g.connect(toRev); toRev.connect(reverb);
        g.connect(toDly); toDly.connect(dly);

        osc.start(when); osc2.start(when);
        osc.stop(when + dur + 0.25); osc2.stop(when + dur + 0.25);
      }

      /* ══════════════════════════════════════════════════════════════
         KOMPOSITION
         Timing: Oasen-Pad sofort | Tropfen 1–3 | Fisch flitzt | Melodie
      ══════════════════════════════════════════════════════════════ */

      // Oasen-Atmosphäre: startet sofort, liegt unter allem
      oasisPad(t0, { dur: 2.6 });

      // Tropfen-Gruppe: tiefere, natürlichere Frequenzen (wie Wasser in ein Becken)
      drop(t0 + 0.00, { f0: 480, f1: 160, dur: 0.38, gain: 0.44, pan: -0.42 });
      drop(t0 + 0.22, { f0: 380, f1: 130, dur: 0.40, gain: 0.40, pan:  0.08 });
      drop(t0 + 0.46, { f0: 520, f1: 175, dur: 0.35, gain: 0.36, pan:  0.40 });

      // Fisch: sanft, kaum hörbar aber spürbar im Stereo
      fishDart(t0 + 0.72, { fromPan: -0.55, toPan: 0.55, dur: 0.28, f0: 160, f1: 480 });

      // Melodie: A-Dur Pentatonik – A4, C#5, E5, A5 – warm & einladend
      crystal(note(9),  t0 + 1.05, { dur: 0.62, gain: 0.40, pan: -0.15 }); // A4
      crystal(note(13), t0 + 1.28, { dur: 0.60, gain: 0.36, pan:  0.14 }); // C#5
      crystal(note(16), t0 + 1.50, { dur: 0.58, gain: 0.33, pan: -0.06 }); // E5

      // kleiner Tropfen dazwischen
      drop(t0 + 1.42, { f0: 340, f1: 115, dur: 0.36, gain: 0.28, pan: 0.35, shimmer: false });

      // Abschluss
      crystal(note(21), t0 + 1.72, { dur: 0.68, gain: 0.30, pan:  0.0  }); // A5
      drop(t0 + 1.90,   { f0: 400, f1: 140, dur: 0.38, gain: 0.22, pan: -0.25 });
      crystal(note(16),  t0 + 2.05, { dur: 0.72, gain: 0.20, pan:  0.0  }); // E5 – leises Ausklingen
    }

    /* ── Bootstrap ───────────────────────────────────────────────── */
    window.playBettaJingle = async function () {
      ctx = createCtx();
      if (ctx.state !== "running") await ctx.resume();
      playJingle();
    };
  })();
</script>
