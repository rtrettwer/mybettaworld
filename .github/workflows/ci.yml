# CI/CD – Build → Test → Deploy (nur auf master)
name: CI/CD

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

# GitHub Pages Berechtigungen
permissions:
  contents: read
  pages: write
  id-token: write

# Kein paralleles Deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build Jekyll
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.3"
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build Jekyll site
        run: cd docs && bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site/

  # ── 3. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test HTML
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.3"
          bundler-cache: true
          working-directory: docs

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: docs/_site/

      - name: Run HTML Proofer
        run: bundle exec ruby scripts/test_html.rb
        continue-on-error: true

  # ── 4. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
