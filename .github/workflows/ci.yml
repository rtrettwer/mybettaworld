# CI/CD – Lint → Test → Deploy (nur auf master)
name: CI/CD

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

# GitHub Pages Berechtigungen
permissions:
  contents: read
  pages: write
  id-token: write

# Kein paralleles Deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

# Node.js 24 für alle Jobs erzwingen
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Markdown Lint
        run: npm run lint:markdown
        continue-on-error: true

      - name: YAML Lint
        run: npm run lint:yaml
        continue-on-error: true

      - name: Prettier Check
        run: npm run lint:prettier
        continue-on-error: true

  # ── 2. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build Jekyll
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        run: cd docs && bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site/

  # ── 3. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test HTML
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: docs

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: docs/_site/

      - name: Run HTML Proofer
        run: bundle exec ruby scripts/test_html.rb
        continue-on-error: true

  # ── 4. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
